{% set name = "deprecat" %}
{% set version = "2.1.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/deprecat-{{ version }}.tar.gz
  sha256: d93cdd493af68981f0c7d198c2b9df2358ead5e54ce3e671a3522af8785917e8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - wrapt <2,>=1.10

test:
  imports:
    - deprecat
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/deprecat/deprecat
  summary: Python @deprecat decorator to deprecate old python classes, functions or methods.
  license: MIT
  license_file: LICENSE.rst

extra:
  recipe-maintainers:
    - ocefpaf
